spring:
  application:
    name: jaz-s27281-nbp
  datasource:
    url: jdbc:h2:mem:nbp;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    username: sa
    password:
    driver-class-name: org.h2.Driver
  h2:
    console:
      enabled: true
  jpa:
    hibernate:
      ddl-auto: update
    open-in-view: false

nbp:
  api:
    base-url: http://api.nbp.pl/api
